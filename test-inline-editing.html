<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Inline Редагування</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ccc;
        }

        .result {
            margin: 10px 0;
            padding: 10px;
            background: #f0f0f0;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        button {
            margin: 5px;
            padding: 10px;
        }

        input {
            margin: 5px;
            padding: 5px;
            width: 200px;
        }

        .log {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 10px;
            margin: 10px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #007bff;
        }

        .log-error {
            border-left-color: #dc3545;
            color: #dc3545;
        }

        .log-success {
            border-left-color: #28a745;
            color: #28a745;
        }
    </style>
</head>

<body>
    <h1>Тест Inline Редагування API</h1>

    <div class="test-section">
        <h2>Тест 1: Оновлення Global Type (довідкова сутність)</h2>
        <p>ID: <input type="number" id="globalTypeId" value="1" /></p>
        <p>Поле: <select id="globalTypeField">
                <option value="ukr">Українська (ukr)</option>
                <option value="eng">English (eng)</option>
                <option value="rus">Москальська (rus)</option>
            </select></p>
        <p>Нове значення: <input type="text" id="globalTypeValue" value="ТЕСТОВЕ ЗНАЧЕННЯ" /></p>
        <button onclick="testGlobalTypeUpdate()">Тестувати Global Type Update</button>
        <div id="globalTypeResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Тест 2: Отримання Global Type</h2>
        <p>ID: <input type="number" id="getGlobalTypeId" value="1" /></p>
        <button onclick="testGetGlobalType()">Отримати Global Type</button>
        <div id="getGlobalTypeResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Тест 3: Перевірка всіх Global Types</h2>
        <button onclick="testGetAllGlobalTypes()">Отримати всі Global Types</button>
        <div id="getAllGlobalTypesResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Лог операцій</h2>
        <div id="log" class="log"></div>
        <button onclick="clearLog()">Очистити лог</button>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type === 'error' ? 'log-error' : type === 'success' ? 'log-success' : ''}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        async function testGlobalTypeUpdate() {
            const id = document.getElementById('globalTypeId').value;
            const field = document.getElementById('globalTypeField').value;
            const value = document.getElementById('globalTypeValue').value;
            const resultDiv = document.getElementById('globalTypeResult');

            log(`🔄 Тестуємо оновлення Global Type ID=${id}, поле=${field}, значення=${value}`);

            try {
                const response = await fetch(`${API_BASE}/global-type/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ [field]: value })
                });

                log(`📡 Відповідь сервера: ${response.status} ${response.statusText}`);

                if (response.ok) {
                    const result = await response.json();
                    log(`✅ Успішно оновлено: ${JSON.stringify(result)}`, 'success');
                    resultDiv.innerHTML = `<div class="success">✅ Успішно оновлено: ${JSON.stringify(result)}</div>`;
                } else {
                    const errorText = await response.text();
                    log(`❌ Помилка сервера: ${response.status} - ${errorText}`, 'error');
                    resultDiv.innerHTML = `<div class="error">❌ Помилка: ${response.status} - ${errorText}</div>`;
                }
            } catch (error) {
                log(`💥 Помилка мережі: ${error.message}`, 'error');
                resultDiv.innerHTML = `<div class="error">💥 Помилка мережі: ${error.message}</div>`;
            }
        }

        async function testGetGlobalType() {
            const id = document.getElementById('getGlobalTypeId').value;
            const resultDiv = document.getElementById('getGlobalTypeResult');

            log(`🔍 Отримуємо Global Type ID=${id}`);

            try {
                const response = await fetch(`${API_BASE}/global-type/${id}`);
                log(`📡 Відповідь сервера: ${response.status} ${response.statusText}`);

                if (response.ok) {
                    const result = await response.json();
                    log(`✅ Отримано: ${JSON.stringify(result)}`, 'success');
                    resultDiv.innerHTML = `<div class="success">✅ Отримано: ${JSON.stringify(result)}</div>`;
                } else {
                    const errorText = await response.text();
                    log(`❌ Помилка сервера: ${response.status} - ${errorText}`, 'error');
                    resultDiv.innerHTML = `<div class="error">❌ Помилка: ${response.status} - ${errorText}</div>`;
                }
            } catch (error) {
                log(`💥 Помилка мережі: ${error.message}`, 'error');
                resultDiv.innerHTML = `<div class="error">💥 Помилка мережі: ${error.message}</div>`;
            }
        }

        async function testGetAllGlobalTypes() {
            const resultDiv = document.getElementById('getAllGlobalTypesResult');

            log(`🔍 Отримуємо всі Global Types`);

            try {
                const response = await fetch(`${API_BASE}/global-type`);
                log(`📡 Відповідь сервера: ${response.status} ${response.statusText}`);

                if (response.ok) {
                    const result = await response.json();
                    log(`✅ Отримано ${result.length} записів`, 'success');
                    resultDiv.innerHTML = `<div class="success">✅ Отримано ${result.length} записів: ${JSON.stringify(result, null, 2)}</div>`;
                } else {
                    const errorText = await response.text();
                    log(`❌ Помилка сервера: ${response.status} - ${errorText}`, 'error');
                    resultDiv.innerHTML = `<div class="error">❌ Помилка: ${response.status} - ${errorText}</div>`;
                }
            } catch (error) {
                log(`💥 Помилка мережі: ${error.message}`, 'error');
                resultDiv.innerHTML = `<div class="error">💥 Помилка мережі: ${error.message}</div>`;
            }
        }

        // Автоматично тестуємо при завантаженні
        window.onload = function () {
            log('🚀 Сторінка завантажена, готово до тестування');
            log('📍 API Base URL: ' + API_BASE);
        };
    </script>
</body>

</html>
